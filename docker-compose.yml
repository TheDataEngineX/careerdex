# ---------------------------------------------------------------
# CareerDEX — Local Development Stack (Docker Compose)
# Spins up the API, Prometheus, Alertmanager, Grafana, and Jaeger
# for local observability development. Not intended for production.
#
# Usage:  docker compose up --build
# Ports:  API 8003 | Prometheus 9090 | Alertmanager 9093
#         Grafana 3000 | Jaeger UI 16686
# ---------------------------------------------------------------
services:

  # --- CareerDEX FastAPI application ---
  careerdex:
    build: .
    container_name: careerdex-api
    ports:
      - "8003:8003"
    environment:
      - LOG_LEVEL=INFO
      - OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - prometheus
      - jaeger
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # --- Prometheus — Metrics collection ---
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: careerdex-prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  # --- Alertmanager — Alert routing ---
  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: careerdex-alertmanager
    ports:
      - "9093:9093"
    restart: unless-stopped

  # --- Grafana — Dashboards & visualisation ---
  grafana:
    image: grafana/grafana:11.3.1
    container_name: careerdex-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
    depends_on:
      - prometheus
    restart: unless-stopped

  # --- Jaeger — Distributed tracing ---
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: careerdex-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
