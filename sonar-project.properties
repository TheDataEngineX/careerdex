# ---------------------------------------------------------------
# SonarQube / SonarCloud — Project Configuration
# Used by the sonar-scanner to analyse code quality and coverage.
# Docs: https://docs.sonarsource.com/sonarqube/latest/analyzing-source-code/scanners/sonarscanner/
# ---------------------------------------------------------------

# Unique project identifier within SonarQube
sonar.projectKey=careerdex
sonar.projectName=CareerDEX
sonar.projectVersion=0.5.0

# Directories to analyse (production source packages)
sonar.sources=src/careerdex
# Test directory (excluded from duplication / complexity metrics)
sonar.tests=tests

# Runtime settings
sonar.python.version=3.12
sonar.sourceEncoding=UTF-8

# Path to the pytest-cov XML report (generated by: pytest --cov --cov-report=xml)
sonar.python.coverage.reportPaths=coverage.xml
